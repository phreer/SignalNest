# ═══════════════════════════════════════════════════════════════
#                    DailyRadar 主配置文件
#
# 所有 API Key / 密码请放在 .env 文件中，不要写在此处。
# ═══════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# 1. 基础设置
# ──────────────────────────────────────────────────────────────
app:
  timezone: "Asia/Shanghai"   # 所有时间操作的基准时区
  language: "zh"              # AI 输出语言："zh" 中文 | "en" 英文


# ──────────────────────────────────────────────────────────────
# 2. 调度计划（多时间点）
#
# 每个 entry 定义一个触发时间点：
#   name:           调度名称（日志和邮件主题中显示）
#   cron:           标准 cron 表达式（由 supercronic 执行）
#   content:        内容块列表，可选值：
#                     news     - 采集新闻 + AI 摘要
#                     schedule - 读取今日日程（personal/schedule.yaml）
#                     todos    - 读取待办提醒（personal/todos.yaml）
#   sources:        news 内容块使用的采集源，可选：github / youtube / rss
#   subject_prefix: 邮件/通知标题前缀
# ──────────────────────────────────────────────────────────────
schedules:
  - name: "早间日报"
    cron: "0 10 * * *"           # 每天早上 10:00
    content: [schedule, todos, news]
    sources: [github, youtube, rss]
    # 早间：快速感知四个维度的要闻，侧重「发生了什么」
    # - AI/科技：昨夜重要发布、开源项目、模型更新
    # - 金融：亚欧市场动态、美股期货、宏观政策信号
    # - 政治：重大外交/政策动向、地缘风险预警
    focus: "AI大模型与科技产品最新动态（发布/开源/融资）；金融市场早盘信号、宏观经济政策与央行动向；全球重要政治外交事件与地缘风险；优先呈现时效性强、影响面广的突发与要闻"
    subject_prefix: "早安 | DailyRadar"

  - name: "晚间日报"
    cron: "0 21 * * *"          # 每天晚上 9:00
    content: [news]
    sources: [github, youtube, rss]
    # 晚间：深度消化今日全局，侧重「意味着什么」
    # - AI/科技：研究突破、深度评测、行业格局变化
    # - 金融：收盘复盘、机构观点、中长期趋势
    # - 政治：事件进展分析、政策解读、多方博弈
    focus: "AI前沿研究与工程实践深度内容；科技公司战略动向与产品分析；金融市场今日复盘、机构观点与宏观趋势解读；全球政治热点事件深度分析与政策影响；优先选取有深度、有观点、值得精读的内容"
    subject_prefix: "晚间精选 | DailyRadar"

  # 更多示例（取消注释即可启用）：
  #
  # - name: "午间快讯"
  #   cron: "0 12 * * *"
  #   content: [news]
  #   sources: [rss]
  #   focus: "今日头条科技快讯"
  #   subject_prefix: "午间快讯 | DailyRadar"
  #
  # - name: "周末深度"
  #   cron: "0 10 * * 6"        # 每周六早上 10:00
  #   content: [news]
  #   sources: [github, youtube, rss]
  #   focus: "深度技术文章、开源项目与学术前沿"
  #   subject_prefix: "周末精选 | DailyRadar"


# ──────────────────────────────────────────────────────────────
# 3. 信息源配置
# ──────────────────────────────────────────────────────────────
collectors:

  # ── GitHub ────────────────────────────────────────────────────
  github:
    enabled: true
    # 爬取 github.com/trending，由 AI 按 focus 方向过滤，无需手动维护关键词
    trending_since: "daily"      # daily（今日）/ weekly（本周）/ monthly（本月）
    # 可选：限定编程语言，留空则抓所有语言的 Trending
    trending_languages: []
    max_repos: 25                # 最多抓取的仓库数

  # ── YouTube ──────────────────────────────────────────────────
  youtube:
    enabled: true               # 需要配置 YOUTUBE_API_KEY 才能生效
    # 要订阅的频道 ID（打开频道主页，URL 中的 UC... 部分）
    channel_ids:
      - "UCnUYZLuoy1rq1aVMwx4aTzw"   # Lex Fridman Podcast
      - "UCcefcZRL2oaA_uBNeo5UOWg"   # Y Combinator
      - "UC9cn0TuPq4dnbTY-CBsm8XA"   # a16z
    max_results_per_channel: 3  # 每个频道最终保留的视频数（按热度排序）
    days_lookback: 7            # 只抓取最近 N 天的视频
    sort_by: "views"            # 排序方式："views"（热度）/ "date"（最新）
    # ── 关键词搜索（其他频道）────────────────────────────────
    # AI 根据当次 schedule 的 focus 自动推导搜索词，覆盖 channel_ids 之外的内容
    enable_keyword_search: true  # 改为 true 开启；会额外消耗一次 AI 调用 + YouTube Search 配额
    max_search_results: 3        # 每个关键词最多取多少条视频（按热度排序）
    search_days_lookback: 3      # 关键词搜索的时间窗口（热点时效性短，独立于订阅频道）

  # ── RSS ──────────────────────────────────────────────────────
  rss:
    enabled: true
    days_lookback: 2            # 只抓取最近 N 天的文章
    max_items_per_feed_initial: 10  # 每 feed 初始抓取的标题数（供 AI 批量筛选）
    max_items_per_feed: 3           # 每 feed 最终进入摘要阶段的文章数
    feeds:
      # 科技资讯
      - id: "hacker-news"
        name: "Hacker News"
        url: "https://hnrss.org/frontpage"
      - id: "hacker-news-best"
        name: "Hacker News Best"
        url: "https://hnrss.org/best"
      - id: "techcrunch"
        name: "TechCrunch"
        url: "https://techcrunch.com/feed/"
      - id: "the-verge"
        name: "The Verge"
        url: "https://www.theverge.com/rss/index.xml"
      - id: "wired"
        name: "Wired"
        url: "https://www.wired.com/feed/rss"
      - id: "ars-technica"
        name: "Ars Technica"
        url: "https://feeds.arstechnica.com/arstechnica/index"
      - id: "mit-tech-review"
        name: "MIT Technology Review"
        url: "https://www.technologyreview.com/feed/"
      # AI 专项
      - id: "langchain-blog"
        name: "LangChain Blog"
        url: "https://blog.langchain.dev/rss/"
      - id: "simon-willison"
        name: "Simon Willison"
        url: "https://simonwillison.net/atom/everything/"
      # 金融 / 经济
      - id: "reuters-business"
        name: "Reuters Business"
        url: "https://feeds.reuters.com/reuters/businessNews"
      - id: "ft-world"
        name: "Financial Times World"
        url: "https://www.ft.com/world?format=rss"
      - id: "bloomberg-tech"
        name: "Bloomberg Technology"
        url: "https://feeds.bloomberg.com/technology/news.rss"
      - id: "economist-finance"
        name: "The Economist Finance"
        url: "https://www.economist.com/finance-and-economics/rss.xml"
      # 政治 / 国际
      - id: "reuters-politics"
        name: "Reuters World"
        url: "https://feeds.reuters.com/reuters/worldNews"
      - id: "economist-world"
        name: "The Economist World"
        url: "https://www.economist.com/the-world-this-week/rss.xml"
      - id: "foreign-affairs"
        name: "Foreign Affairs"
        url: "https://www.foreignaffairs.com/rss.xml"


# ──────────────────────────────────────────────────────────────
# 4. AI 配置
# API Key / 模型 / 端点通过环境变量配置（AI_API_KEY / AI_MODEL / AI_API_BASE）
# 以下为 fallback 默认值，环境变量优先级更高
# ──────────────────────────────────────────────────────────────
ai:
  # 模型名称（LiteLLM 格式：provider/model_name），环境变量 AI_MODEL 优先
  # 示例：openai/gpt-5.2  |  gemini/gemini-3.1-pro-preview
  model: "openai/gpt-5.2"
  # 自定义 API 端点（环境变量 AI_API_BASE 优先，使用官方接口时留空）
  api_base: ""
  max_tokens: 2048              # 每条摘要的最大 token 数
  min_relevance_score: 5        # 相关性过滤阈值（1-10），低于此分数不展示
  max_items_per_digest: 20      # 每次最多展示的新闻条目数
  taste_examples_limit: 8       # 从历史反馈中取多少条高分示例作为 few-shot


# ──────────────────────────────────────────────────────────────
# 5. 通知渠道
# 所有 API Key / 密码 / Webhook URL 请在 .env 中配置
# ──────────────────────────────────────────────────────────────
notifications:

  # ── 邮件（主要渠道）──────────────────────────────────────────
  email:
    enabled: true
    # 收件人列表（也可通过 EMAIL_TO 环境变量配置，逗号分隔）
    recipients:
      - "your_email@example.com"
    # SMTP 配置通过环境变量：
    #   EMAIL_FROM, EMAIL_PASSWORD, EMAIL_SMTP_SERVER, EMAIL_SMTP_PORT

  # ── 飞书群机器人 ──────────────────────────────────────────────
  feishu:
    enabled: false              # 改为 true 并配置 FEISHU_WEBHOOK_URL 即可启用

  # ── 企业微信群机器人 ─────────────────────────────────────────
  wework:
    enabled: false              # 改为 true 并配置 WEWORK_WEBHOOK_URL 即可启用
    msg_type: "markdown"        # "markdown" 或 "text"


# ──────────────────────────────────────────────────────────────
# 6. 存储设置
# ──────────────────────────────────────────────────────────────
storage:
  data_dir: "/app/data"         # 数据目录（容器内路径，通过 volume 持久化）
  todo_lookahead_days: 3        # TODO 提前提醒天数（未来 N 天内的 TODO 都会显示）
