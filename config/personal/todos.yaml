# ═══════════════════════════════════════════════════════════════
#              个人 TODO 配置 - personal/todos.yaml
#
# DailyRadar 早间日报会自动提取：
#   - 已逾期未完成的项目（显示警告标记）
#   - 今日到期的项目（显示今日截止标记）
#   - 未来 N 天内即将到期的项目（N 由 config.yaml 的 todo_lookahead_days 控制）
#
# 字段说明：
#   id:       唯一标识（字符串，自定义）
#   title:    事项标题
#   due:      截止日期，格式 YYYY-MM-DD（null 表示无截止日期，不会在日报中显示）
#   priority: 优先级 high / medium / low
#   tags:     标签列表（可选，用于分类）
#   notes:    备注（可选）
#   done:     完成状态 true / false（true 时不在日报中显示）
# ═══════════════════════════════════════════════════════════════

settings:
  lookahead_days: 3     # 提前提醒天数（未来 3 天内截止的 TODO 都会显示）
  show_overdue: true    # 是否显示逾期未完成的项目

